<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>final-project-bootcamp</title>
    <link rel="stylesheet" href="/src/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-zinc-800 text-slate-200">
    <main class="">
      <div
        class="md:mx-120 md:my-24 mx-4 my-48 rounded-xl px-4 py-24 bg-zinc-900 space-y-2 border border-neutral-700 hover:shadow-md shadow-pink-500 transition-all duration-300"
      >
        <a href="" class="flex gap-3 font-medium text-3xl text-pink-500">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-bot-message-square-icon lucide-bot-message-square"
          >
            <path d="M12 6V2H8" />
            <path d="M15 11v2" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path
              d="M20 16a2 2 0 0 1-2 2H8.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 4 20.286V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2z"
            />
            <path d="M9 11v2" />
          </svg>
          ChitChat
        </a>
        <h2 class="text-lg font-medium">login to your account here</h2>
        <div class="space-y-4 text-center">
          <form action="" class="space-y-12">
            <div class="space-y-3">
              <div>
                <input
                  type="email"
                  placeholder="Email / Username"
                  class="w-full outline rounded-lg py-2 px-3 outline-neutral-600 focus:outline-neutral-300"
                />
              </div>
              <div class="text-right space-y-2">
                <input
                  type="password"
                  placeholder="Password"
                  class="w-full outline rounded-lg py-2 px-3 outline-neutral-600 focus:outline-neutral-300"
                />
                <a href="" class="text-sm font-medium">Forget Password?</a>
              </div>
            </div>
            <a href="index.html" class="bg-pink-500 rounded-lg px-4 py-2 font-medium">
              Login
            </a>
          </form>
          <h3 class="text-sm">
            Don't have an account yet?
            <a href="register.html" class="text-pink-500 font-medium">Sign In</a>
            here
          </h3>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
